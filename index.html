<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Project portfolio of KGOSI — a live gateway to all GitHub repositories." />
  <title>KGOSI — Project Portfolio</title>

  <link rel="preconnect" href="https://api.github.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme"></button>

  <header class="hero">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-inner">
      <div class="avatar-ring">
        <img id="avatar" class="avatar" alt="" src="" width="116" height="116" />
      </div>
      <div class="hero-text">
        <p id="eyebrow" class="eyebrow">Project Portfolio</p>
        <h1 id="name">Loading…</h1>
        <p id="tagline" class="tagline"></p>
        <p id="meta" class="meta"></p>
        <div class="hero-links">
          <a id="ghLink" class="btn btn-primary" href="#" target="_blank" rel="noopener">GitHub Profile</a>
        </div>
      </div>
    </div>
    <div id="stats" class="stats" aria-label="Profile statistics"></div>
  </header>

  <main class="container">
    <section class="controls">
      <input id="search" class="search" type="search" placeholder="Search projects by name, description or language…" aria-label="Search projects" />
      <select id="sort" class="sort" aria-label="Sort projects">
        <option value="updated">Recently updated</option>
        <option value="stars">Most stars</option>
        <option value="name">Name (A–Z)</option>
        <option value="created">Newest</option>
      </select>
    </section>

    <div id="status" class="status"></div>
    <section id="repos" class="repo-grid" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <p>A live gateway to my work — this page updates automatically as I publish new projects.</p>
    <p id="footerName"></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
